services:
  zincsearch:
    image: public.ecr.aws/zinclabs/zincsearch:latest
    container_name: yanakilla-zinc
    restart: unless-stopped
    environment:
      ZINC_FIRST_ADMIN_USER: ${ZINC_USER:-admin}
      ZINC_FIRST_ADMIN_PASSWORD: ${ZINC_PASSWORD:?definir ZINC_PASSWORD}
      ZINC_DATA_PATH: /data
    volumes:
      - zinc-data:/data
    expose:
      - "4080"

  app:
    build: .
    container_name: yanakilla-app
    restart: unless-stopped
    depends_on:
      - zincsearch
    environment:
      ZINC_URL: http://zincsearch:4080
      ZINC_USER: ${ZINC_USER:-admin}
      ZINC_PASSWORD: ${ZINC_PASSWORD:?definir ZINC_PASSWORD}
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    container_name: yanakilla-caddy
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  zinc-data:
  caddy-data:
  caddy-config:
